# Cloud Billing Example Configuration

# ── Billing Account ──────────────────────────────────────────
billing_account: &billing_account
  id: "01ABCD-EFGHIJ-KLMNOP"
  display_name: "Production Billing Account"
  currency: "USD"

# ── Budget: Production Monthly ───────────────────────────────
budgets:
  - &prod_monthly
    display_name: "production-monthly"
    billing_account: *billing_account
    amount:
      units: "10000"
      currency_code: "USD"
    calendar_period: "MONTH"
    threshold_rules:
      - threshold_percent: 0.5
        spend_basis: "CURRENT_SPEND"
      - threshold_percent: 0.8
        spend_basis: "FORECASTED_SPEND"
      - threshold_percent: 1.0
        spend_basis: "CURRENT_SPEND"
    notifications:
      pubsub_topic: "projects/my-project/topics/budget-alerts"
      email_recipients:
        - "finance@example.com"
        - "devops@example.com"
    filter:
      projects:
        - "projects/my-prod-project"
      credit_types_treatment: "INCLUDE_ALL_CREDITS"

  # ── Budget: Development Quarterly ──────────────────────────
  - &dev_quarterly
    display_name: "development-quarterly"
    billing_account: *billing_account
    amount:
      units: "3000"
      currency_code: "USD"
    calendar_period: "QUARTER"
    threshold_rules:
      - threshold_percent: 0.5
        spend_basis: "CURRENT_SPEND"
      - threshold_percent: 0.9
        spend_basis: "FORECASTED_SPEND"
    notifications:
      pubsub_topic: "projects/my-project/topics/budget-alerts"
    filter:
      projects:
        - "projects/my-dev-project"
        - "projects/my-staging-project"
      services:
        - "services/6F81-5844-456A"  # Compute Engine
        - "services/95FF-2EF5-5EA1"  # Cloud Storage
      credit_types_treatment: "EXCLUDE_ALL_CREDITS"

# ── Billing Export ───────────────────────────────────────────
billing_exports:
  - &standard_export
    billing_account: *billing_account
    dataset_spec:
      dataset_id: "billing_data"
      table_prefix: "gcp_billing"
    export_type: "STANDARD_USAGE_COST"

  - &detailed_export
    billing_account: *billing_account
    dataset_spec:
      dataset_id: "billing_data"
      table_prefix: "gcp_billing_detailed"
    export_type: "DETAILED_USAGE_COST"

# ── Project Billing Links ────────────────────────────────────
project_links:
  - project_id: "my-prod-project"
    billing_account: *billing_account
  - project_id: "my-dev-project"
    billing_account: *billing_account
  - project_id: "my-staging-project"
    billing_account: *billing_account

# ── Pricing Query Examples ───────────────────────────────────
pricing_queries:
  compute_engine_us:
    service_id: "services/6F81-5844-456A"
    region: "us-central1"
    sku_filter: "N2 Predefined Instance Core"
  cloud_storage_standard:
    service_id: "services/95FF-2EF5-5EA1"
    region: "us"
    sku_filter: "Standard Storage"
