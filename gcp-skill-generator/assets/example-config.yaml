# Example configuration for gcp-[product]-ops
# This file serves as a template for credential and resource configuration.

# UX Configuration
# All UX settings follow references/user-experience-spec.md
ux:
  # Onboarding settings
  onboarding:
    quick_start_enabled: true
    show_capabilities_table: true
    prerequisite_checklist: true

  # Interaction settings
  interaction:
    max_prompts_describe: 1
    max_prompts_create: 2
    max_prompts_modify: 2
    max_prompts_delete: 1
    confirmation_required_for_destructive: true
    smart_defaults_enabled: true

  # Smart defaults (applied when user does not specify)
  smart_defaults:
    name_pattern: "[product]-[resource]-[timestamp]"
    project_source: "env.CLOUDSDK_CORE_PROJECT"
    zone_selection: "first_available"
    timeout_seconds: 300
    page_size: 50

  # Feedback settings
  feedback:
    show_progress_for_ops_over_seconds: 5
    show_elapsed_time: true
    success_show_next_steps: true
    failure_show_remediation: true

  # Error handling settings
  error_handling:
    format: "[ERROR] {code}: {summary}\n\nWhat happened:\n{explanation}\n\nHow to fix:\n{remediation}\n\nNext step:\n{next_action}"
    auto_retry_throttling: true
    max_retries_throttling: 3
    backoff_strategy: "exponential"

  # Escalation settings
  escalation:
    template_enabled: true
    include_resource_id: true
    include_error_code: true
    include_timestamp: true
    support_channel: "https://console.cloud.google.com/support/"

# Credentials
credentials:
  google_application_credentials: "{{env.GOOGLE_APPLICATION_CREDENTIALS}}"
  project_id: "{{env.CLOUDSDK_CORE_PROJECT}}"
  zone: "{{env.CLOUDSDK_COMPUTE_ZONE}}"

# Shared YAML anchors example
x-prod: &prod
  project: "my-gcp-project"
  zone: "us-central1-f"
  network_tier: "PREMIUM"

instance:
  <<: *prod
  name: "prod-web-01"
  machine_type: "n1-standard-4"

dev-instance:
  <<: *prod
  name: "dev-web-01"
  machine_type: "n1-standard-1"

# Defaults
defaults:
  project: ""
  zone: ""
  timeout_seconds: 30
  retry_count: 3

# Optimization settings
optimization:
  fault_diagnosis:
    pre_flight_state_validation: true
    health_check_enabled: true
    error_taxonomy_minimum_codes: 10

  root_cause:
    dependency_mapping_enabled: true
    log_correlation_enabled: true

  rapid_resolution:
    auto_remediation_enabled: true
    auto_remediation_safe_errors:
      - UNAVAILABLE
      - INTERNAL
      - ABORTED
    escalation_template_standardized: true