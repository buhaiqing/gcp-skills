redis_defaults: &redis_defaults
  region: us-central1
  memory_size_gb: 1
  tier: basic
  redis_version: redis_7_0
  network: default

redis_prod:
  <<: *redis_defaults
  memory_size_gb: 10
  tier: standard
  redis_version: redis_7_2
  auth_enabled: true
  transit_encryption_enabled: true

redis_dev:
  <<: *redis_defaults
  memory_size_gb: 1
  tier: basic
  redis_version: redis_7_0
  auth_enabled: false

redis_staging:
  <<: *redis_defaults
  memory_size_gb: 4
  tier: standard
  redis_version: redis_7_0

export_config: &export_config
  project: &project "{{env.CLOUDSDK_CORE_PROJECT}}"
  gcs_bucket: "gs://redis-exports"

prod_export:
  <<: *export_config
  schedule: "0 2 * * *"  # Daily at 2 AM UTC